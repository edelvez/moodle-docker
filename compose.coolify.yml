services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MOODLE_DATABASE_NAME:-moodle}
      POSTGRES_USER: ${MOODLE_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${MOODLE_DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOODLE_DATABASE_USER:-postgres} -d ${MOODLE_DATABASE_NAME:-moodle}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  moodle:
    image: bitnamilegacy/moodle:${MOODLE_IMAGE_TAG:-5.0.2}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MOODLE_HOST: ${MOODLE_HOST}
      MOODLE_DATABASE_TYPE: ${MOODLE_DATABASE_TYPE:-pgsql}
      MOODLE_DATABASE_HOST: postgres
      MOODLE_DATABASE_PORT_NUMBER: 5432
      MOODLE_DATABASE_NAME: ${MOODLE_DATABASE_NAME:-moodle}
      MOODLE_DATABASE_USER: ${MOODLE_DATABASE_USER:-postgres}
      MOODLE_DATABASE_PASSWORD: ${MOODLE_DATABASE_PASSWORD}
      MOODLE_USERNAME: ${MOODLE_ADMIN_USERNAME}
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD}
      MOODLE_EMAIL: ${MOODLE_ADMIN_EMAIL}
      MOODLE_SMTP_HOST: ${MOODLE_SMTP_HOST}
      MOODLE_SMTP_PORT_NUMBER: ${MOODLE_SMTP_PORT_NUMBER}
      MOODLE_SMTP_USER: ${MOODLE_SMTP_USER}
      MOODLE_SMTP_PASSWORD: ${MOODLE_SMTP_PASSWORD}
      MOODLE_SMTP_PROTOCOL: ${MOODLE_SMTP_PROTOCOL}
      MOODLE_REVERSEPROXY: ${MOODLE_REVERSEPROXY:-yes}
      MOODLE_SSLPROXY: ${MOODLE_SSLPROXY:-yes}
      MOODLE_REDIS_HOST: redis
      MOODLE_REDIS_PORT: "6379"
      MOODLE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      ALLOW_EMPTY_PASSWORD: "no"
      BITNAMI_DEBUG: "false"
    volumes:
      - moodledata:/bitnami/moodledata
      - moodle:/bitnami/moodle
    networks:
      - internal

volumes:
  postgres_data:
  moodle:
  moodledata:

networks:
  internal:
    driver: bridge
